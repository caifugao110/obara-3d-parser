name: Build Windows Executable

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate dynamic version
        id: generate_version
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
              $version = "${{ github.ref_name }}"
          } else {
              $date = Get-Date -Format "yyyy.MM.dd"
              $baseVersion = "v$date-beta"
              $existingTags = git ls-remote --tags --refs origin "$baseVersion*"
              $buildCount = 1
              while ($existingTags -like "*$baseVersion-$buildCount*") {
                  $buildCount++
              }
              $version = "$baseVersion-$buildCount"
          }
          Write-Host "Generated version: $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Generate changelog from git history
        id: generate_changelog
        run: |
          $lastTag = git describe --tags --abbrev=0 HEAD^ 2>$null
          if ($LASTEXITCODE -ne 0) {
              Write-Host "No previous tag found, using all commits"
              $changelog = git log --no-merges --oneline --format="- %s"
          } else {
              Write-Host "Previous tag: $lastTag"
              $changelog = git log --no-merges "$lastTag..HEAD" --oneline --format="- %s"
          }
          if (-not $changelog) {
              $changelog = "- No changes to report"
          }
          $changelog = $changelog -join "`n"
          $changelog = $changelog -replace "`r`n", "`n"
          Write-Host "Changelog:`n$changelog"
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "changelog<<EOF`n", [System.Text.Encoding]::UTF8)
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, $changelog, [System.Text.Encoding]::UTF8)
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "`nEOF`n", [System.Text.Encoding]::UTF8)

      - name: Update pyproject.toml with dynamic version
        run: |
          $version = "${{ steps.generate_version.outputs.version }}"
          (Get-Content "pyproject.toml") -replace 'version = ".*?"', "version = `"$version`"" | Set-Content "pyproject.toml"
          Write-Host "Updated pyproject.toml version to: $version"

      - name: Verify gmsh installation
        run: |
          $env:PYTHONIOENCODING = 'utf-8'
          python -c "import gmsh; print('gmsh version:', gmsh.__version__)"

      - name: Cache PyInstaller build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('obara-3d-parser.spec', 'requirements.txt') }}

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --distpath dist --workpath build obara-3d-parser.spec

      - name: Verify build
        run: |
          if (Test-Path "dist/obara-3d-parser/obara-3d-parser.exe") {
              $size = (Get-Item "dist/obara-3d-parser/obara-3d-parser.exe").Length / 1MB
              Write-Host "EXE created: $([math]::Round($size, 1)) MB"
          } else {
              Write-Error "EXE not found!"
              exit 1
          }

      - name: Zip distribution folder
        run: |
          $version = "${{ steps.generate_version.outputs.version }}"
          Compress-Archive -Path "dist/obara-3d-parser" -DestinationPath "dist/obara-3d-parser_$version.zip" -Force
          Write-Host "ZIP created: obara-3d-parser_$version.zip"

      - name: Clean intermediate build artifacts
        run: |
          if (Test-Path "build") {
              Remove-Item -Recurse -Force "build"
              Write-Host "Removed build directory"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obara-3d-parser
          path: dist/obara-3d-parser_${{ steps.generate_version.outputs.version }}.zip
          if-no-files-found: error

      - name: Create tag if version changed
        id: create_tag
        if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
        run: |
          $version = "${{ steps.generate_version.outputs.version }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          if (git ls-remote --exit-code --tags origin $version) {
              Write-Host "Tag $version already exists, skipping"
              echo "created=false" >> $env:GITHUB_OUTPUT
          } else {
              Write-Host "Creating tag $version"
              git tag $version
              git push origin $version
              Write-Host "Tag pushed successfully"
              echo "created=true" >> $env:GITHUB_OUTPUT
              echo "tag=$version" >> $env:GITHUB_OUTPUT
          }

      - name: Create Release (on push to main)
        if: github.ref == 'refs/heads/main' && steps.create_tag.outputs.created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create_tag.outputs.tag }}
          files: dist/obara-3d-parser_${{ steps.generate_version.outputs.version }}.zip
          name: ${{ steps.generate_version.outputs.version }}
          body: |
            **obara-3d-parser** - ${{ steps.generate_version.outputs.version }}
            
            A lightweight SolidWorks-style FEA simulation software.
            
            **Changes:**
            ${{ steps.generate_changelog.outputs.changelog }}
            
            **Features:**
            - STEP file import with automatic tetrahedral meshing
            - Material database with 100+ materials
            - Linear static analysis
            - Displacement and von Mises stress visualization
            - Safety factor calculation
            
            **Download:**
            - [obara-3d-parser_${{ steps.generate_version.outputs.version }}.zip](https://github.com/${{ github.repository }}/releases/download/${{ steps.create_tag.outputs.tag }}/obara-3d-parser_${{ steps.generate_version.outputs.version }}.zip)

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/obara-3d-parser_${{ steps.generate_version.outputs.version }}.zip
          name: ${{ steps.generate_version.outputs.version }}
          body: |
            **obara-3d-parser** - ${{ steps.generate_version.outputs.version }}
            
            A lightweight SolidWorks-style FEA simulation software.
            
            **Changes:**
            ${{ steps.generate_changelog.outputs.changelog }}
            
            **Features:**
            - STEP file import with automatic tetrahedral meshing
            - Material database with 100+ materials
            - Linear static analysis
            - Displacement and von Mises stress visualization
            - Safety factor calculation
            
            **Download:**
            - [obara-3d-parser_${{ steps.generate_version.outputs.version }}.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/obara-3d-parser_${{ steps.generate_version.outputs.version }}.zip)